<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Tugas Web 1</title>
    <link rel="stylesheet" href="style.css">
    <meta name="description" content="Halaman Login untuk Tugas Web 1">
</head>
<body>

    <!-- Container Utama menggunakan DIV -->
    <div class="container">
        <div class="form-header">
            <h2>Masuk</h2>
        </div>
        
        <form action="#" method="POST">
            <div class="input-group">
                <label for="username">Username / Email</label>
                <!-- Input field for username -->
                <input type="text" id="username" name="username" placeholder="Masukkan username anda" required>
            </div>
            
            <div class="input-group">
                <label for="password">Password</label>
                <!-- Input field for password -->
                <input type="password" id="password" name="password" placeholder="Masukkan password anda" required>
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="footer-link">
            <!-- Hyperlink ke halaman Registrasi -->
            Belum punya akun? <a href="register.html">Daftar sekarang</a>
        </div>
    </div>

</body>
</html>
